version: 1
filesystem_policy:
  include_workdir: true
  read_only:
  - /usr
  - /lib
  - /opt/hermes
  - /proc
  - /dev/urandom
  - /app
  - /etc
  - /var/log
  - /sandbox/.hermes
  read_write:
  - /sandbox
  - /tmp
  - /dev/null
  - /sandbox/.hermes-data
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  nvidia:
    name: nvidia
    endpoints:
    - host: integrate.api.nvidia.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: POST
          path: /v1/chat/completions
      - allow:
          method: POST
          path: /v1/completions
      - allow:
          method: POST
          path: /v1/embeddings
      - allow:
          method: GET
          path: /v1/models
      - allow:
          method: GET
          path: /v1/models/**
    - host: inference-api.nvidia.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: POST
          path: /v1/chat/completions
      - allow:
          method: POST
          path: /v1/completions
      - allow:
          method: POST
          path: /v1/embeddings
      - allow:
          method: GET
          path: /v1/models
      - allow:
          method: GET
          path: /v1/models/**
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/local/bin/hermes
    - path: /opt/hermes/.venv/bin/hermes
    - path: /usr/bin/python3
    - path: /usr/bin/python3.13
    - path: /opt/hermes/.venv/bin/python
  outlook:
    name: outlook
    endpoints:
    - host: graph.microsoft.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow: { method: GET, path: "/**" }
      - allow: { method: POST, path: "/**" }
      - allow: { method: PATCH, path: "/**" }
    - host: host.openshell.internal
      port: 8765
      protocol: rest
      enforcement: enforce
      allowed_ips:
      - 10.0.0.0/8
      - 172.0.0.0/8
      - 192.168.0.0/16
      - fc00::/7
      rules:
      - allow: { method: GET, path: /token }
    - host: host.docker.internal
      port: 8765
      protocol: rest
      enforcement: enforce
      allowed_ips:
      - 10.0.0.0/8
      - 172.0.0.0/8
      - 192.168.0.0/16
      - fc00::/7
      rules:
      - allow: { method: GET, path: /token }
    binaries:
    - path: /usr/local/bin/ms-graph-sidecar
  phoenix_collector:
    name: phoenix_collector
    endpoints:
    - host: host.openshell.internal
      port: 6006
      protocol: rest
      enforcement: enforce
      allowed_ips:
      - 10.0.0.0/8
      - 172.0.0.0/8
      - 192.168.0.0/16
      - fc00::/7
      rules:
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/bin/python3
    - path: /usr/bin/python3.13
    - path: /opt/hermes/.venv/bin/python
  source_etl_api:
    name: source_etl_api
    endpoints:
    - host: host.openshell.internal
      port: 3100
      protocol: rest
      enforcement: enforce
      allowed_ips:
      - 10.0.0.0/8
      - 172.0.0.0/8
      - 192.168.0.0/16
      - fc00::/7
      rules:
      - allow:
          method: GET
          path: /**
    binaries:
    - path: /usr/bin/python3
    - path: /usr/bin/python3.13
    - path: /opt/hermes/.venv/bin/python
    - path: /usr/local/bin/hermes
    - path: /opt/hermes/.venv/bin/hermes
    - path: /usr/bin/curl
  slack:
    name: slack
    endpoints:
    - host: slack.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    - host: api.slack.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    - host: hooks.slack.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    - host: wss-primary.slack.com
      port: 443
      access: full
    - host: wss-backup.slack.com
      port: 443
      access: full
    binaries:
    - path: /usr/bin/curl
    - path: /usr/local/bin/node
    - path: /usr/bin/node
    - path: /usr/bin/python3
    - path: /usr/bin/python3.13
    - path: /usr/local/bin/python3
    - path: /usr/local/bin/hermes
    - path: /opt/hermes/.venv/bin/hermes
    - path: /opt/hermes/.venv/bin/python
