<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 40px; }
  h2 { font-size: 28px; font-weight: 700; color: #111; margin-bottom: 30px; }
</style>
</head>
<body>
<h2>Technical Architecture</h2>
<svg width="1100" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00b09b"/>
    </marker>
    <marker id="arrow-multi" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00b09b"/>
    </marker>
  </defs>

  <!-- === USERS COLUMN === -->
  <!-- Paula -->
  <rect x="20" y="30" width="130" height="44" rx="8" fill="#f0fdf9" stroke="#00b09b" stroke-width="1.5"/>
  <text x="85" y="48" text-anchor="middle" font-size="12" font-weight="600" fill="#00b09b">Paula</text>
  <text x="85" y="64" text-anchor="middle" font-size="10" fill="#555">Store Manager · Barcelona</text>

  <!-- Sergio -->
  <rect x="20" y="90" width="130" height="44" rx="8" fill="#f0fdf9" stroke="#00b09b" stroke-width="1.5"/>
  <text x="85" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#00b09b">Sergio</text>
  <text x="85" y="124" text-anchor="middle" font-size="10" fill="#555">Country Manager</text>

  <!-- Raffaele -->
  <rect x="20" y="150" width="130" height="44" rx="8" fill="#f0fdf9" stroke="#00b09b" stroke-width="1.5"/>
  <text x="85" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#00b09b">Raffaele</text>
  <text x="85" y="184" text-anchor="middle" font-size="10" fill="#555">Data Analyst</text>

  <!-- users label -->
  <text x="85" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#111">Users</text>

  <!-- arrows from users to Telegram -->
  <line x1="150" y1="52" x2="240" y2="100" stroke="#00b09b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="150" y1="112" x2="240" y2="112" stroke="#00b09b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="150" y1="172" x2="240" y2="124" stroke="#00b09b" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- === TELEGRAM === -->
  <rect x="245" y="70" width="110" height="84" rx="10" fill="white" stroke="#00b09b" stroke-width="2"/>
  <!-- Telegram icon (simplified) -->
  <circle cx="300" cy="95" r="18" fill="#29b6f6"/>
  <path d="M290,95 L315,84 L308,107 L302,101 L295,105 Z" fill="white"/>
  <path d="M302,101 L300,110 L308,107 Z" fill="#b3e5fc"/>
  <text x="300" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#111">Telegram</text>

  <!-- arrow Telegram → Agentic Layer -->
  <line x1="355" y1="112" x2="415" y2="112" stroke="#00b09b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- === AGENTIC LAYER === -->
  <rect x="418" y="30" width="195" height="310" rx="12" fill="white" stroke="#00b09b" stroke-width="2.5"/>
  <text x="515" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="#00b09b">Agentic Layer</text>

  <!-- NemoClaw box inside -->
  <rect x="438" y="65" width="155" height="50" rx="8" fill="#f0fdf9" stroke="#00b09b" stroke-width="1.5"/>
  <text x="515" y="87" text-anchor="middle" font-size="13" font-weight="700" fill="#111">NemoClaw</text>
  <text x="515" y="105" text-anchor="middle" font-size="10" fill="#555">Agent orchestration</text>

  <!-- Identity box -->
  <rect x="438" y="130" width="155" height="50" rx="8" fill="#f0fdf9" stroke="#00b09b" stroke-width="1.5"/>
  <text x="515" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#111">Identity</text>
  <text x="515" y="167" text-anchor="middle" font-size="10" fill="#555">AGENTS · SOUL · USER</text>

  <!-- Skills box -->
  <rect x="438" y="195" width="155" height="50" rx="8" fill="#f0fdf9" stroke="#00b09b" stroke-width="1.5"/>
  <text x="515" y="215" text-anchor="middle" font-size="13" font-weight="700" fill="#111">Skills</text>
  <text x="515" y="232" text-anchor="middle" font-size="10" fill="#555">Retail API · Tools</text>

  <!-- Nvidia NVIDIA logo placeholder + model name -->
  <rect x="438" y="260" width="155" height="65" rx="8" fill="#1a1a2e" stroke="#76b900" stroke-width="1.5"/>
  <text x="515" y="283" text-anchor="middle" font-size="11" font-weight="700" fill="#76b900">NVIDIA</text>
  <text x="515" y="300" text-anchor="middle" font-size="11" font-weight="600" fill="white">Nemotron</text>
  <text x="515" y="316" text-anchor="middle" font-size="10" fill="#aaa">120B Super</text>

  <!-- arrow Agentic → Auth -->
  <line x1="613" y1="165" x2="668" y2="165" stroke="#00b09b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- === AUTH FASTAPI === -->
  <rect x="671" y="80" width="160" height="170" rx="10" fill="white" stroke="#00b09b" stroke-width="2"/>
  <text x="751" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#111">Auth FastAPI</text>

  <!-- divider -->
  <line x1="680" y1="116" x2="822" y2="116" stroke="#e0e0e0" stroke-width="1"/>

  <text x="751" y="136" text-anchor="middle" font-size="10" fill="#555">Telegram ID →</text>
  <text x="751" y="150" text-anchor="middle" font-size="10" fill="#555">TelegramAuth table</text>

  <!-- divider -->
  <line x1="680" y1="160" x2="822" y2="160" stroke="#e0e0e0" stroke-width="1"/>

  <text x="751" y="178" text-anchor="middle" font-size="10" font-weight="600" fill="#00b09b">Issues scoped JWT (1h)</text>
  <text x="751" y="194" text-anchor="middle" font-size="10" fill="#555">role + store_id injected</text>

  <!-- divider -->
  <line x1="680" y1="204" x2="822" y2="204" stroke="#e0e0e0" stroke-width="1"/>

  <text x="695" y="220" font-size="9" fill="#888">Paula → store_manager</text>
  <text x="695" y="234" font-size="9" fill="#888">Sergio → country_manager</text>
  <text x="695" y="248" font-size="9" fill="#888">Raffaele → data_analyst</text>

  <!-- arrow Auth → PostgreSQL -->
  <line x1="831" y1="165" x2="888" y2="165" stroke="#00b09b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- === POSTGRESQL === -->
  <rect x="891" y="90" width="140" height="150" rx="10" fill="white" stroke="#00b09b" stroke-width="2"/>
  <!-- DB icon -->
  <ellipse cx="961" cy="118" rx="35" ry="12" fill="#f0fdf9" stroke="#00b09b" stroke-width="1.5"/>
  <rect x="926" y="118" width="70" height="30" fill="#f0fdf9"/>
  <ellipse cx="961" cy="148" rx="35" ry="12" fill="#f0fdf9" stroke="#00b09b" stroke-width="1.5"/>

  <text x="961" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#111">PostgreSQL</text>
  <text x="961" y="191" text-anchor="middle" font-size="10" fill="#555">Enforces RBAC</text>
  <text x="961" y="205" text-anchor="middle" font-size="10" fill="#555">at DB level</text>
  <text x="961" y="222" text-anchor="middle" font-size="9" fill="#888">RLS · Row-level security</text>

  <!-- return arrow PostgreSQL → user (response back through Telegram) -->
  <path d="M961,240 Q961,370 300,370 Q248,370 248,154" stroke="#00b09b" stroke-width="1.8" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- label on return path -->
  <text x="570" y="390" text-anchor="middle" font-size="10" fill="#888">response via Telegram</text>

</svg>
</body>
</html>
