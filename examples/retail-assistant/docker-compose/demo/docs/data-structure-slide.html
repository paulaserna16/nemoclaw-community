<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: white;
    font-family: 'Segoe UI', Arial, sans-serif;
    padding: 36px 50px;
    width: 1100px;
  }
  h2 {
    font-size: 30px;
    font-weight: 800;
    color: #111;
    margin-bottom: 28px;
  }
  svg { overflow: visible; }
  .table-pill {
    rx: 10;
    ry: 10;
  }
</style>
</head>
<body>
<h2>Data structure</h2>

<svg width="1000" height="460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0.5 L0,6.5 L7,3.5 z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- ==================== RELATIONSHIP LINES (drawn first, behind pills) ==================== -->

  <!-- Stores → Inventory -->
  <line x1="120" y1="95" x2="120" y2="218" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Employees → TelegramAuth -->
  <line x1="430" y1="95" x2="590" y2="95" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Employees → Stores (works at) -->
  <line x1="380" y1="95" x2="160" y2="95" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Products → Inventory -->
  <line x1="340" y1="218" x2="220" y2="218" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Products → Promotions -->
  <line x1="440" y1="218" x2="560" y2="218" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Orders → Customers -->
  <line x1="270" y1="338" x2="270" y2="118" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Orders → Stores -->
  <line x1="230" y1="338" x2="120" y2="118" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- OrderItems → Orders -->
  <line x1="450" y1="338" x2="360" y2="338" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- OrderItems → Products -->
  <line x1="490" y1="318" x2="420" y2="238" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- InventoryTransfers → Stores -->
  <line x1="160" y1="418" x2="120" y2="118" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ReorderRequests → Stores -->
  <line x1="430" y1="418" x2="130" y2="118" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ReorderRequests → Products -->
  <line x1="450" y1="408" x2="400" y2="238" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ==================== LAYER LABELS ==================== -->

  <!-- People & Stores label -->
  <text x="30" y="52" font-size="12" font-weight="700" fill="#555" letter-spacing="1">PEOPLE &amp; STORES</text>
  <line x1="30" y1="56" x2="720" y2="56" stroke="#eee" stroke-width="1"/>

  <!-- Catalog label -->
  <text x="30" y="172" font-size="12" font-weight="700" fill="#555" letter-spacing="1">CATALOG</text>
  <line x1="30" y1="176" x2="720" y2="176" stroke="#eee" stroke-width="1"/>

  <!-- Orders label -->
  <text x="30" y="292" font-size="12" font-weight="700" fill="#555" letter-spacing="1">ORDERS</text>
  <line x1="30" y1="296" x2="720" y2="296" stroke="#eee" stroke-width="1"/>

  <!-- Stock Operations label -->
  <text x="30" y="378" font-size="12" font-weight="700" fill="#555" letter-spacing="1">STOCK OPERATIONS</text>
  <line x1="30" y1="382" x2="720" y2="382" stroke="#eee" stroke-width="1"/>

  <!-- ==================== PILLS — People & Stores row (y=65) ==================== -->
  <!-- Stores -->
  <rect x="30" y="65" width="160" height="44" rx="10" fill="#00b09b"/>
  <text x="110" y="92" text-anchor="middle" font-size="15" font-weight="800" fill="white">Stores</text>

  <!-- Customers -->
  <rect x="210" y="65" width="160" height="44" rx="10" fill="#00b09b"/>
  <text x="290" y="92" text-anchor="middle" font-size="15" font-weight="800" fill="white">Customers</text>

  <!-- Employees -->
  <rect x="390" y="65" width="160" height="44" rx="10" fill="#00b09b"/>
  <text x="470" y="92" text-anchor="middle" font-size="15" font-weight="800" fill="white">Employees</text>

  <!-- TelegramAuth -->
  <rect x="570" y="65" width="160" height="44" rx="10" fill="#00b09b"/>
  <text x="650" y="92" text-anchor="middle" font-size="15" font-weight="800" fill="white">TelegramAuth</text>

  <!-- ==================== PILLS — Catalog row (y=195) ==================== -->
  <!-- Inventory -->
  <rect x="30" y="195" width="160" height="44" rx="10" fill="#1a237e"/>
  <text x="110" y="222" text-anchor="middle" font-size="15" font-weight="800" fill="white">Inventory</text>

  <!-- Products -->
  <rect x="210" y="195" width="160" height="44" rx="10" fill="#1a237e"/>
  <text x="290" y="222" text-anchor="middle" font-size="15" font-weight="800" fill="white">Products</text>

  <!-- Promotions -->
  <rect x="390" y="195" width="160" height="44" rx="10" fill="#1a237e"/>
  <text x="470" y="222" text-anchor="middle" font-size="15" font-weight="800" fill="white">Promotions</text>

  <!-- ==================== PILLS — Orders row (y=315) ==================== -->
  <!-- Orders -->
  <rect x="120" y="315" width="160" height="44" rx="10" fill="#7b1fa2"/>
  <text x="200" y="342" text-anchor="middle" font-size="15" font-weight="800" fill="white">Orders</text>

  <!-- OrderItems -->
  <rect x="310" y="315" width="160" height="44" rx="10" fill="#7b1fa2"/>
  <text x="390" y="342" text-anchor="middle" font-size="15" font-weight="800" fill="white">OrderItems</text>

  <!-- ==================== PILLS — Stock Operations row (y=395) ==================== -->
  <!-- InventoryTransfers -->
  <rect x="30" y="395" width="200" height="44" rx="10" fill="#00bcd4"/>
  <text x="130" y="422" text-anchor="middle" font-size="14" font-weight="800" fill="white">Inventory Transfers</text>

  <!-- ReorderRequests -->
  <rect x="260" y="395" width="200" height="44" rx="10" fill="#00bcd4"/>
  <text x="360" y="422" text-anchor="middle" font-size="14" font-weight="800" fill="white">Reorder Requests</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="760" y="65" width="220" height="340" rx="12" fill="#fafafa" stroke="#eee" stroke-width="1.5"/>
  <text x="870" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#555">Key relationships</text>
  <line x1="770" y1="100" x2="970" y2="100" stroke="#eee" stroke-width="1"/>

  <!-- legend items -->
  <line x1="780" y1="125" x2="820" y2="125" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="830" y="129" font-size="11" fill="#555">foreign key</text>

  <rect x="780" y="155" width="30" height="18" rx="4" fill="#00b09b"/>
  <text x="820" y="168" font-size="11" fill="#555">People &amp; Stores</text>

  <rect x="780" y="185" width="30" height="18" rx="4" fill="#1a237e"/>
  <text x="820" y="198" font-size="11" fill="#555">Catalog</text>

  <rect x="780" y="215" width="30" height="18" rx="4" fill="#7b1fa2"/>
  <text x="820" y="228" font-size="11" fill="#555">Orders</text>

  <rect x="780" y="245" width="30" height="18" rx="4" fill="#00bcd4"/>
  <text x="820" y="258" font-size="11" fill="#555">Stock Operations</text>

  <!-- key FK notes -->
  <text x="780" y="295" font-size="10" fill="#888">TelegramAuth.telegram_id</text>
  <text x="780" y="310" font-size="10" fill="#888">  → Employees (auth)</text>

  <text x="780" y="330" font-size="10" fill="#888">Inventory.(store_id,</text>
  <text x="780" y="345" font-size="10" fill="#888">  product_id) composite</text>

  <text x="780" y="365" font-size="10" fill="#888">RLS enforced on</text>
  <text x="780" y="380" font-size="10" fill="#888">  Transfers + Reorders</text>

</svg>

</body>
</html>
