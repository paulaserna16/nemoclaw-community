<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: white;
    font-family: 'Segoe UI', Arial, sans-serif;
    padding: 40px 50px;
    width: 1100px;
  }
  h2 {
    font-size: 30px;
    font-weight: 800;
    color: #111;
    margin-bottom: 28px;
    border-bottom: 3px solid #00b09b;
    padding-bottom: 8px;
    display: inline-block;
  }
  .agentic-box {
    border: 2.5px solid #00b09b;
    border-radius: 14px;
    padding: 24px 30px 30px 30px;
    position: relative;
  }
  .agentic-label {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 0 14px;
    font-size: 15px;
    font-weight: 800;
    color: #111;
    letter-spacing: 0.5px;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
  }
  .plus {
    font-size: 28px;
    font-weight: 300;
    color: #aaa;
  }

  /* === LLM block === */
  .llm-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .llm-block img { width: 64px; }
  .llm-block .label {
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    color: #111;
    line-height: 1.4;
  }

  /* === NemoClaw block === */
  .nemo-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .nemo-photo {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #00b09b;
  }
  .nemo-block .label {
    font-size: 14px;
    font-weight: 700;
    color: #111;
  }

  /* === skill.md card === */
  .card {
    border: 2px solid #1a237e;
    border-radius: 10px;
    padding: 14px 16px;
    min-width: 200px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 800;
    color: #1a237e;
    text-align: center;
    margin-bottom: 12px;
  }
  .pill {
    border-radius: 6px;
    padding: 10px 14px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: white;
    margin-bottom: 8px;
  }
  .pill:last-child { margin-bottom: 0; }
  .pill-teal    { background: #00b09b; }
  .pill-purple  { background: #7b1fa2; }
  .pill-navy    { background: #1a237e; }

  /* === identity card === */
  .identity-card {
    border: 2px solid #6a1b9a;
    border-radius: 10px;
    padding: 14px 16px;
    min-width: 220px;
  }
  .identity-card .card-title {
    color: #6a1b9a;
    border-bottom: 1.5px solid #e1bee7;
    padding-bottom: 8px;
    margin-bottom: 12px;
  }
  .identity-pill-soul {
    background: #6a1b9a;
    margin-bottom: 8px;
  }
  .identity-pill-agents {
    background: #283593;
  }
  .pill-subtitle {
    font-size: 10px;
    font-weight: 400;
    opacity: 0.88;
    margin-top: 2px;
  }
</style>
</head>
<body>
<h2>Nemoclaw skill in detail</h2>

<div class="agentic-box">
  <span class="agentic-label">Agentic Layer</span>

  <div class="row">

    <!-- LLM -->
    <div class="llm-block">
      <svg width="68" height="68" viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- NVIDIA-style hexagonal icon -->
        <polygon points="34,4 62,19 62,49 34,64 6,49 6,19" fill="#1a1a2e" stroke="#76b900" stroke-width="2"/>
        <!-- inner grid dots -->
        <circle cx="22" cy="28" r="3" fill="#76b900"/>
        <circle cx="34" cy="22" r="3" fill="#76b900"/>
        <circle cx="46" cy="28" r="3" fill="#76b900"/>
        <circle cx="22" cy="40" r="3" fill="#76b900"/>
        <circle cx="34" cy="46" r="3" fill="#76b900"/>
        <circle cx="46" cy="40" r="3" fill="#76b900"/>
        <circle cx="34" cy="34" r="4" fill="#76b900"/>
        <line x1="22" y1="28" x2="34" y2="22" stroke="#76b900" stroke-width="1"/>
        <line x1="34" y1="22" x2="46" y2="28" stroke="#76b900" stroke-width="1"/>
        <line x1="46" y1="28" x2="46" y2="40" stroke="#76b900" stroke-width="1"/>
        <line x1="46" y1="40" x2="34" y2="46" stroke="#76b900" stroke-width="1"/>
        <line x1="34" y1="46" x2="22" y2="40" stroke="#76b900" stroke-width="1"/>
        <line x1="22" y1="40" x2="22" y2="28" stroke="#76b900" stroke-width="1"/>
        <line x1="22" y1="28" x2="34" y2="34" stroke="#76b900" stroke-width="0.8" stroke-dasharray="2,2"/>
        <line x1="46" y1="28" x2="34" y2="34" stroke="#76b900" stroke-width="0.8" stroke-dasharray="2,2"/>
        <line x1="46" y1="40" x2="34" y2="34" stroke="#76b900" stroke-width="0.8" stroke-dasharray="2,2"/>
        <line x1="22" y1="40" x2="34" y2="34" stroke="#76b900" stroke-width="0.8" stroke-dasharray="2,2"/>
      </svg>
      <div class="label">Nvidia<br>Nemotron<br>120b super</div>
    </div>

    <div class="plus">+</div>

    <!-- NemoClaw (crab emoji as stand-in since no photo access) -->
    <div class="nemo-block">
      <div style="width:72px;height:72px;border-radius:50%;background:#1a1a2e;border:3px solid #00b09b;display:flex;align-items:center;justify-content:center;font-size:36px;">🦞</div>
      <div class="label">NemoClaw</div>
    </div>

    <div class="plus">+</div>

    <!-- skill.md card -->
    <div class="card">
      <div class="card-title">skill.md</div>
      <div class="pill pill-teal">User Context</div>
      <div class="pill pill-purple">API</div>
      <div class="pill pill-navy">Database structure</div>
    </div>

    <div class="plus">+</div>

    <!-- identity card -->
    <div class="identity-card">
      <div class="card-title" style="font-size:15px;font-weight:800;text-align:center;">identity/</div>
      <div class="pill identity-pill-soul pill">
        SOUL.md
        <div class="pill-subtitle">Auth · RBAC rules · Security</div>
      </div>
      <div class="pill identity-pill-agents pill">
        AGENTS.md
        <div class="pill-subtitle">Tone · Format · Behavior</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
