version: 1
filesystem_policy:
  include_workdir: true
  read_only:
  - /usr
  - /lib
  - /proc
  - /dev/urandom
  - /app
  - /etc
  - /var/log
  read_write:
  - /tmp
  - /dev/null
  - /sandbox/.openclaw
  - /sandbox/.nemoclaw
  - /sandbox
  - /home/linuxbrew
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  clawhub:
    name: clawhub
    endpoints:
    - host: clawhub.ai
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
  discord:
    name: discord
    endpoints:
    - host: discord.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    - host: gateway.discord.gg
      port: 443
      tls: skip
      access: full
    - host: cdn.discordapp.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    binaries:
    - path: /usr/local/bin/node
  managed_inference:
    name: managed_inference
    endpoints:
    - host: inference.local
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
    - path: /usr/bin/node
    - path: /usr/bin/curl
    - path: /usr/bin/python3
  npm_registry:
    name: npm_registry
    endpoints:
    - host: registry.npmjs.org
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    binaries:
    - path: /usr/local/bin/openclaw
  nvidia:
    name: nvidia
    endpoints:
    - host: integrate.api.nvidia.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: POST
          path: /v1/chat/completions
      - allow:
          method: POST
          path: /v1/completions
      - allow:
          method: POST
          path: /v1/embeddings
      - allow:
          method: GET
          path: /v1/models
      - allow:
          method: GET
          path: /v1/models/**
    - host: inference-api.nvidia.com
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: POST
          path: /v1/chat/completions
      - allow:
          method: POST
          path: /v1/completions
      - allow:
          method: POST
          path: /v1/embeddings
      - allow:
          method: GET
          path: /v1/models
      - allow:
          method: GET
          path: /v1/models/**
    binaries:
    - path: /usr/local/bin/openclaw
  openclaw_api:
    name: openclaw_api
    endpoints:
    - host: openclaw.ai
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
  openclaw_docs:
    name: openclaw_docs
    endpoints:
    - host: docs.openclaw.ai
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
    binaries:
    - path: /usr/local/bin/openclaw
  telegram:
    name: telegram
    endpoints:
    - host: api.telegram.org
      port: 443
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /bot*/**
      - allow:
          method: POST
          path: /bot*/**
      - allow:
          method: GET
          path: /file/bot*/**
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
    - path: /usr/bin/node
  retail_api_local:
    name: retail-api-local
    endpoints:
    - host: host.openshell.internal
      port: 8001
      protocol: rest
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**
      - allow:
          method: POST
          path: /**
      - allow:
          method: PUT
          path: /**
      - allow:
          method: PATCH
          path: /**
      - allow:
          method: DELETE
          path: /**
    binaries:
    - path: /usr/local/bin/openclaw
    - path: /usr/local/bin/node
    - path: /usr/bin/node
    - path: /usr/bin/curl
